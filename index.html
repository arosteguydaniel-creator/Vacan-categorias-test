<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién es el más vacán?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Fredoka', 'Comic Sans MS', 'Arial', sans-serif; 
            /* Fondo equilibrado: Predomina el azul, rosado muy suave */
            background: linear-gradient(-45deg, #74b9ff, #a29bfe, #81ecec, #fab1a0);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* Animación del movimiento del fondo */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* La vaquita con efecto de flotar */
        .vaca-img { 
            width: 150px; 
            display: block; 
            margin: 0 auto 10px auto; 
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 { 
            font-style: italic; 
            font-size: 1.8rem; 
            margin: 10px 0; 
            color: #1a1a1a;
            text-align: center;
            font-family: 'Fredoka', 'Comic Sans MS', 'Arial', sans-serif;
        }

        .preg-tag { 
            background-color: #5da2d5; 
            color: white; 
            padding: 8px 25px; 
            border-radius: 25px; 
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        .card { 
            background: white;
            width: 100%; 
            max-width: 350px; 
            border-radius: 20px; 
            padding: 30px 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            text-align: center;
        }

        .tipo-pregunta { 
            background-color: #d65a6d; 
            color: white; 
            padding: 5px 15px; 
            border-radius: 15px; 
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        #texto-pregunta { 
            font-size: 1.2rem; 
            color: #333; 
            margin: 20px 0;
            line-height: 1.4;
        }

        .btn-revelar { 
            background-color: #d65a6d; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            width: 100%; 
            cursor: pointer; 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .btn-revelar:active { transform: scale(0.98); }

        #respuesta { 
            margin-top: 15px; 
            font-weight: bold; 
            font-size: 1.2rem; 
            display: none; 
        }

        #respuesta.verdadero {
            color: #2ecc71;
        }

        #respuesta.falso {
            color: #e74c3c;
        }

        .btn-siguiente { 
            background-color: #5da2d5; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            margin-top: 15px; 
            width: 100%; 
            cursor: pointer;
            display: none;
        }

        .hidden {
            display: none !important;
        }

        #pantalla-inicial {
            width: 100%;
            max-width: 420px;
            text-align: center;
            margin-top: 25px;
        }

        #pantalla-inicial .tipo-pregunta {
            background-color: #d65a6d;
            color: white;
            display: inline-block;
            margin-bottom: 15px;
            font-size: 1.2rem;
            padding: 8px 18px;
        }

        #intro-texto {
            font-size: 1rem;
            color: #5f4b3d;
            margin: 0 0 18px;
        }

        .categoria-btn {
            background: linear-gradient(135deg, #6c5ce7, #8e7dff);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 15px 18px;
            font-size: 1.02rem;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            margin: 10px auto;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
            box-shadow: 0 10px 24px rgba(108, 92, 231, 0.25);
            font-family: 'Fredoka', 'Comic Sans MS', 'Arial', sans-serif;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .categoria-btn:hover,
        .categoria-btn:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(108, 92, 231, 0.25);
            outline: none;
        }
    </style>
</head>
<body>

    <img src="VACAN_2.png" alt="La Vaca" class="vaca-img" onerror="this.style.display='none'"> 

    <h1>¿QUIÉN ES EL MÁS VACÁN?</h1>

    <div id="pantalla-inicial" class="card">
        <div class="tipo-pregunta">Elige tu categoría</div>
        <p id="intro-texto">Comienza el juego con una selección rápida.</p>
        <button type="button" class="categoria-btn" data-categoria="todo" onclick="seleccionarCategoria('todo')">🧠 De todo un poco</button>
        <button type="button" class="categoria-btn" data-categoria="historia" onclick="seleccionarCategoria('historia')">📜 Curiosidades de la historia</button>
        <button type="button" class="categoria-btn" data-categoria="todo" onclick="seleccionarCategoria('todo')">✨ Mixto y divertido</button>
    </div>

    <div id="contador" class="preg-tag hidden">PREGUNTA #1</div>

    <div id="preguntas-card" class="card hidden">
        <div id="categoria-tipo" class="tipo-pregunta">¿VERDADERO O FALSO?</div>
        <p id="texto-pregunta">Cargando...</p>
        
        <button id="btn-revelar" class="btn-revelar" onclick="revelar()">
            🔍 REVELAR RESPUESTA
        </button>
        
        <div id="respuesta"></div>
        
        <button id="btn-siguiente" class="btn-siguiente" onclick="siguiente()">
            SIGUIENTE PREGUNTA ➔
        </button>
    </div>

<script>
    const bancoTodoUnPoco = [
    { q: "El sonido viaja más rápido en el agua que en el aire", a: "¡VERDADERO! El agua es más densa.", tipo: "verdadero" },
    { q: "Las jirafas tienen cuerdas vocales", a: "FALSO. Son prácticamente mudas.", tipo: "falso" },
    { q: "Chile es el país más largo del mundo", a: "VERDADERO. (De norte a sur).", tipo: "verdadero" },
    { q: "Un rayo es más caliente que la superficie del sol", a: "VERDADERO. Hasta 5 veces más.", tipo: "verdadero" },
    { q: "Los humanos comparten el 50% de su ADN con un plátano", a: "¡VERDADERO! Es pura biología.", tipo: "verdadero" },
    { q: "Las hormigas nunca duermen", a: "VERDADERO. Toman pequeñas siestas de segundos.", tipo: "verdadero" },
    { q: "Los elefantes son los únicos animales que no pueden saltar", a: "VERDADERO. Pesan demasiado.", tipo: "verdadero" },
    { q: "El corazón de una ballena azul es del tamaño de un auto", a: "VERDADERO. ¡Es enorme!", tipo: "verdadero" },
    { q: "La miel nunca se echa a perder", a: "VERDADERO. Han hallado miel de 3000 años comestible.", tipo: "verdadero" },
    { q: "El pulpo tiene tres corazones", a: "VERDADERO. Dos para las branquias y uno para el cuerpo.", tipo: "verdadero" },
    { q: "Los pingüinos tienen rodillas", a: "VERDADERO. Están ocultas bajo sus plumas.", tipo: "verdadero" },
    { q: "El teclado QWERTY fue diseñado para escribir más rápido", a: "FALSO. Fue para no trabar las máquinas viejas.", tipo: "falso" },
    { q: "Venus es el planeta más caliente del sistema solar", a: "VERDADERO. Por su atmósfera espesa.", tipo: "verdadero" },
    { q: "Los conejos son roedores", a: "FALSO. Son lagomorfos.", tipo: "falso" },
    { q: "El encendedor se inventó antes que los fósforos", a: "VERDADERO. El encendedor se inventó en 1823 y los fósforos en 1826.", tipo: "verdadero" },
    { q: "Un año en Mercurio dura solo 88 días", a: "VERDADERO. Gira muy rápido al sol.", tipo: "verdadero" },
    { q: "Los perros solo ven en blanco y negro", a: "FALSO. Ven colores, pero menos que nosotros.", tipo: "falso" },
    { q: "Los gatos tienen 32 músculos en cada oreja", a: "VERDADERO. Las mueven como radares.", tipo: "verdadero" },
    { q: "La Torre Eiffel crece en verano", a: "VERDADERO. Por la expansión del metal.", tipo: "verdadero" },
    { q: "Mónaco es más pequeño que el Central Park de NY", a: "VERDADERO. Es un país diminuto.", tipo: "verdadero" },
    { q: "El nombre de Google viene de un número matemático", a: "VERDADERO. Viene de 'Googol'.", tipo: "verdadero" },
    { q: "Australia es más ancha que la Luna", a: "VERDADERO. Por unos 600 kilómetros.", tipo: "verdadero" },
    { q: "El Sol representa el 99% de la masa del sistema solar", a: "VERDADERO. Es casi todo el sistema.", tipo: "verdadero" },
    { q: "El desierto del Sahara es el más grande del mundo", a: "FALSO. Es la Antártida (los desiertos se miden por falta de lluvia, no por arena).", tipo: "falso" },
    { q: "Los caballitos de mar macho dan a luz", a: "VERDADERO. Llevan los huevos en su bolsa.", tipo: "verdadero" },
    { q: "Las huellas dactilares de los koalas son como las humanas", a: "VERDADERO. Son casi imposibles de distinguir.", tipo: "verdadero" },
    { q: "La Coca-Cola originalmente era verde", a: "FALSO. Siempre fue de color oscuro.", tipo: "falso" },
    { q: "Se puede escuchar el silencio en el espacio", a: "VERDADERO. No hay aire para mover el sonido.", tipo: "verdadero" },
    { q: "Napoleón era extremadamente bajito", a: "FALSO. Medía 1.68m, era mala publicidad de sus enemigos.", tipo: "falso" },
    { q: "El agua líquida puede congelarse y hervir al mismo tiempo", a: "VERDADERO. Ocurre en el 'punto triple' bajo condiciones específicas de presión.", tipo: "verdadero" },
    { q: "Los flamencos nacen con plumas de color rosa brillante", a: "FALSO. Nacen grises; se vuelven rosas por los camarones que comen.", tipo: "falso" },
    { q: "Un día en Venus es más largo que un año en Venus", a: "VERDADERO. Tarda más en girar sobre sí mismo que en darle la vuelta al sol.", tipo: "verdadero" },
    { q: "El monte Everest es el punto más cercano al espacio exterior", a: "FALSO. Es el volcán Chimborazo en Ecuador, debido al ensanchamiento de la Tierra.", tipo: "falso" },
    { q: "Los plátanos crecen en árboles gigantes", a: "FALSO. La platanera es una hierba gigante, no un árbol.", tipo: "falso" },
    { q: "Las papas fritas tipo 'French Fries' se inventaron en Bélgica", a: "VERDADERO. A pesar de su nombre en inglés, su origen es belga.", tipo: "verdadero" },
    { q: "Hay más estrellas en el universo que granos de arena en todas las playas de la Tierra", a: "VERDADERO. El universo es ridículamente masivo.", tipo: "verdadero" },
    { q: "Los diamantes están hechos de carbón supercomprimido", a: "VERDADERO. Es carbono puro cristalizado bajo presión extrema.", tipo: "verdadero" },
    { q: "Nintendo se fundó cuando aún existían los samuráis", a: "VERDADERO. Se creó en 1889 haciendo cartas de juego tradicionales.", tipo: "verdadero" },
    { q: "El océano Atlántico es el más profundo del planeta", a: "FALSO. Es el océano Pacífico (allí está la Fosa de las Marianas).", tipo: "falso" },
    { q: "Los tiburones existían antes que los árboles", a: "VERDADERO. Los tiburones aparecieron hace 400 millones de años; los árboles, después.", tipo: "verdadero" }
];

    const bancoCuriosidadesHistoria = [
    { q: "El chocolate era usado como moneda por los aztecas", a: "VERDADERO. El cacao valía oro.", tipo: "verdadero" },
    { q: "La Gran Muralla China es visible desde la Luna", a: "FALSO. Es un mito muy común.", tipo: "falso" },
    { q: "Los romanos usaban orina para lavar la ropa", a: "VERDADERO. La usaban como detergente por su amoníaco.", tipo: "verdadero" },
    { q: "La primera computadora electrónica se creó durante la Segunda Guerra Mundial", a: "VERDADERO. Fue un invento militar temprano.", tipo: "verdadero" },
    { q: "El calendario gregoriano reemplazó al juliano en 1582", a: "VERDADERO. Para corregir el desfase solar.", tipo: "verdadero" },
    { q: "Cristóbal Colón descubrió que la Tierra era redonda", a: "FALSO. Ya se sabía mucho antes de su viaje.", tipo: "falso" },
    { q: "Los vikingos usaban cascos con cuernos en batalla", a: "FALSO. Eso es un mito moderno.", tipo: "falso" },
    { q: "La Gran Pirámide de Guiza fue construida por esclavos", a: "FALSO. Era obra de trabajadores especializados.", tipo: "falso" },
    { q: "El primer papel moneda (billete) fue creado en China", a: "VERDADERO. Fue en la dinastía Song.", tipo: "verdadero" },
    { q: "La Asamblea Nacional de Francia se reunió por primera vez en 1789", a: "VERDADERO. Fue el inicio de la Revolución Francesa.", tipo: "verdadero" },
    { q: "El algodón de azúcar fue inventado por un dentista", a: "VERDADERO. Ironías de la historia.", tipo: "verdadero" },
    { q: "Cleopatra vivió cronológicamente más cerca de la llegada del hombre a la luna que de la construcción de las pirámides", a: "VERDADERO. Las pirámides ya eran antiquísimas en su época.", tipo: "verdadero" },
    { q: "Albert Einstein rechazó ser el presidente de Israel", a: "VERDADERO. Se lo ofrecieron en 1952 y dijo que no tenía aptitudes humanas.", tipo: "verdadero" },
    { q: "La guerra más corta de la historia duró menos de una hora", a: "VERDADERO. La guerra anglo-zanzibari duró exactamente 38 minutos.", tipo: "verdadero" },
    { q: "Los antiguos griegos se ejercitaban completamente desnudos", a: "VERDADERO. De hecho, la palabra 'gimnasio' significa escuela para desnudarse.", tipo: "verdadero" },
    { q: "El Titanic fue el primer barco en usar la señal de auxilio S.O.S.", a: "FALSO. Ya se había usado antes, pero el Titanic ayudó a popularizarla.", tipo: "falso" },
    { q: "Julio César fue emperador de Roma", a: "FALSO. Fue dictador, pero nunca tuvo el título oficial de Emperador (el primero fue Augusto).", tipo: "falso" },
    { q: "En la antigua Inglaterra, la gente usaba cráneos humanos como copas para beber", a: "VERDADERO. Lo hacían algunos pueblos celtas y de la edad de hielo.", tipo: "verdadero" },
    { q: "Estados Unidos le compró el territorio de Alaska a Rusia", a: "VERDADERO. Se cerró el trato en 1867 por una ganga.", tipo: "verdadero" },
    { q: "Las momias egipcias se llegaron a usar como medicina en Europa durante el siglo XVI", a: "VERDADERO. Se molían hasta hacerse polvo creyendo que curaban enfermedades.", tipo: "verdadero" },
    { q: "El rey Luis XIV de Francia se bañó solo tres veces en toda su vida", a: "VERDADERO. Según los registros de la época, odiaba el agua por consejo médico.", tipo: "verdadero" },
    { q: "Los primeros autos usaban una palanca de mando parecida a un joystick en vez de volante", a: "VERDADERO. Los volantes circulares llegaron años después.", tipo: "verdadero" },
    { q: "Atila el Huno murió desangrado por la nariz en su noche de bodas", a: "VERDADERO. Sufrió una hemorragia tras beber demasiado.", tipo: "verdadero" },
    { q: "La guillotina se usó para ejecutar personas en Francia hasta la década de 1970", a: "VERDADERO. La última ejecución fue en 1977, el mismo año que se estrenó Star Wars.", tipo: "verdadero" },
    { q: "El Imperio Romano llegó a expandirse por los cinco continentes", a: "FALSO. Solo controló territorios en Europa, Asia y África.", tipo: "falso" },
    { q: "Los juicios de brujas de Salem terminaron con las acusadas quemadas en la hoguera", a: "FALSO. Fueron colgadas o murieron en prisión; ninguna fue quemada viva.", tipo: "falso" },
    { q: "Antes del siglo XX, los niños de familias ricas usaban vestidos idénticos a los de las niñas hasta los 6 o 7 años", a: "VERDADERO. Era una costumbre práctica para cambiar pañales y lavar ropa.", tipo: "verdadero" },
    { q: "La bombilla eléctrica fue inventada 100% por Thomas Edison", a: "FALSO. Edison mejoró y patentó un diseño comercialmente viable, pero se basó en inventos previos.", tipo: "falso" },
    { q: "La Universidad de Harvard se fundó antes de que existiera el cálculo matemático", a: "VERDADERO. Harvard nació en 1636; Newton y Leibniz desarrollaron el cálculo décadas después.", tipo: "verdadero" },
    { q: "El presidente de EE.UU. Abraham Lincoln está en el salón de la fama del boxeo", a: "VERDADERO. Antes de la política era un luchador feroz con solo una derrota registrada.", tipo: "verdadero" },
    { q: "Los gladiadores romanos raramente luchaban a muerte", a: "VERDADERO. Eran atletas caros de entrenar y mantener; morir era el peor negocio.", tipo: "verdadero" },
    { q: "El Imperio Azteca cayó principalmente porque los españoles tenían armas de fuego avanzadas", a: "FALSO. Cayó por las alianzas de los españoles con otros pueblos indígenas enemigos de los aztecas y por las enfermedades.", tipo: "falso" },
    { q: "En la Edad Media, la Iglesia Católica llegó a enjuiciar y ejecutar animales en tribunales públicos", a: "VERDADERO. Hubo juicios formales contra cerdos, ratas y langostas por 'crímenes'.", tipo: "verdadero" },
    { q: "Lord Byron tenía un oso como mascota en su dormitorio universitario", a: "VERDADERO. Como no le dejaban tener perros en Cambridge, llevó un oso para desafiar las reglas.", tipo: "verdadero" },
    { q: "El telescopio fue inventado por Galileo Galilei", a: "FALSO. Fue inventado en los Países Bajos por Hans Lippershey; Galileo lo mejoró para mirar el cielo.", tipo: "falso" },
    { q: "La firma de la Declaración de Independencia de EE.UU. no ocurrió el 4 de julio", a: "VERDADERO. Se votó el 2 de julio y la mayoría la firmó en agosto.", tipo: "verdadero" },
    { q: "Durante la Primera Guerra Mundial, se usaron palomas mensajeras con cámaras fotográficas minúsculas", a: "VERDADERO. Se usaban para espionaje y reconocimiento aéreo.", tipo: "verdadero" },
    { q: "Wolfgang Amadeus Mozart compuso su primera sinfonía a los 18 años", a: "FALSO. La escribió cuando tenía apenas 8 años.", tipo: "falso" },
    { q: "El partido de fútbol que causó una guerra real ocurrió entre El Salvador y Honduras", a: "VERDADERO. Ocurrió en 1969 tras las tensiones de las eliminatorias al Mundial.", tipo: "verdadero" },
    { q: "Los mayas predijeron de forma exacta el fin del mundo para el año 2012", a: "FALSO. Solo terminaba un ciclo de su calendario de cuenta larga, nunca hablaron del fin del mundo.", tipo: "falso" }
];

    let mazo = [];
    let actual = 0;
    let num = 1;
    let categoriaSeleccionada = null;

    function inicializarBotonesCategorias() {
        document.querySelectorAll('.categoria-btn').forEach((boton) => {
            boton.addEventListener('click', () => {
                seleccionarCategoria(boton.dataset.categoria || 'todo');
            });
        });
    }

    function seleccionarCategoria(categoria) {
        const pantallaInicial = document.getElementById('pantalla-inicial');
        pantallaInicial.style.display = 'none';
        document.getElementById('contador').classList.remove('hidden');
        document.getElementById('preguntas-card').classList.remove('hidden');

        const tipoLabel = document.getElementById('categoria-tipo');
        if (categoria === 'historia') {
            mazo = [...bancoCuriosidadesHistoria];
            categoriaSeleccionada = 'historia';
            tipoLabel.innerText = 'CURIOSIDADES DE LA HISTORIA';
        } else {
            mazo = [...bancoTodoUnPoco];
            categoriaSeleccionada = 'todo';
            tipoLabel.innerText = 'DE TODO UN POCO';
        }

        num = 1;
        sacarPregunta();
    }

    function sacarPregunta() {
        if (mazo.length === 0) {
            mazo = categoriaSeleccionada === 'historia'
                ? [...bancoCuriosidadesHistoria]
                : [...bancoTodoUnPoco];
        }

        actual = Math.floor(Math.random() * mazo.length);
        document.getElementById('texto-pregunta').innerText = mazo[actual].q;
        document.getElementById('contador').innerText = "PREGUNTA #" + num;
        document.getElementById('respuesta').style.display = 'none';
        document.getElementById('respuesta').className = '';
        document.getElementById('btn-siguiente').style.display = 'none';
        document.getElementById('btn-revelar').style.display = 'flex';
    }

    function revelar() {
        const respDiv = document.getElementById('respuesta');
        respDiv.innerText = mazo[actual].a;
        respDiv.className = mazo[actual].tipo;
        respDiv.style.display = 'block';
        document.getElementById('btn-revelar').style.display = 'none';
        document.getElementById('btn-siguiente').style.display = 'block';
    }

    function siguiente() {
        mazo.splice(actual, 1); 
        num++;
        sacarPregunta();
    }

    inicializarBotonesCategorias();
</script>

</body>
</html>
