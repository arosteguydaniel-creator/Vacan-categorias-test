<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién es el más vacán?</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Arial Black', sans-serif; 
            /* Fondo equilibrado: Predomina el azul, rosado muy suave */
            background: linear-gradient(-45deg, #74b9ff, #a29bfe, #81ecec, #fab1a0);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* Animación del movimiento del fondo */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* La vaquita con efecto de flotar */
        .vaca-img { 
            width: 150px; 
            display: block; 
            margin: 0 auto 10px auto; 
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 { 
            font-style: italic; 
            font-size: 1.8rem; 
            margin: 10px 0; 
            color: #1a1a1a;
            text-align: center;
        }

        .preg-tag { 
            background-color: #5da2d5; 
            color: white; 
            padding: 8px 25px; 
            border-radius: 25px; 
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        .card { 
            background: white;
            width: 100%; 
            max-width: 350px; 
            border-radius: 20px; 
            padding: 30px 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            text-align: center;
        }

        .tipo-pregunta { 
            background-color: #d65a6d; 
            color: white; 
            padding: 5px 15px; 
            border-radius: 15px; 
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        #texto-pregunta { 
            font-size: 1.2rem; 
            color: #333; 
            margin: 20px 0;
            line-height: 1.4;
        }

        .btn-revelar { 
            background-color: #d65a6d; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            width: 100%; 
            cursor: pointer; 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .btn-revelar:active { transform: scale(0.98); }

        #respuesta { 
            margin-top: 15px; 
            font-weight: bold; 
            font-size: 1.2rem; 
            display: none; 
        }

        #respuesta.verdadero {
            color: #2ecc71;
        }

        #respuesta.falso {
            color: #e74c3c;
        }

        .btn-siguiente { 
            background-color: #5da2d5; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            margin-top: 15px; 
            width: 100%; 
            cursor: pointer;
            display: none;
        }

        .hidden {
            display: none !important;
        }

        #pantalla-inicial {
            width: 100%;
            max-width: 420px;
            text-align: center;
            margin-top: 25px;
        }

        #pantalla-inicial .tipo-pregunta {
            background-color: #d65a6d;
            color: white;
            display: inline-block;
            margin-bottom: 15px;
        }

        .categoria-btn {
            background-color: #6c5ce7;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 1rem;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            margin: 10px auto;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
        }

        .categoria-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>

    <img src="VACAN_2.png" alt="La Vaca" class="vaca-img" onerror="this.style.display='none'"> 

    <h1>¿QUIÉN ES EL MÁS VACÁN?</h1>

    <div id="pantalla-inicial" class="card">
        <div class="tipo-pregunta">Elige tu categoría</div>
        <p id="intro-texto">Comienza el juego con una selección rápida.</p>
        <button class="categoria-btn" onclick="seleccionarCategoria('todo')">De todo un poco</button>
        <button class="categoria-btn" onclick="seleccionarCategoria('historia')">Curiosidades de la historia</button>
    </div>

    <div id="contador" class="preg-tag hidden">PREGUNTA #1</div>

    <div id="preguntas-card" class="card hidden">
        <div id="categoria-tipo" class="tipo-pregunta">¿VERDADERO O FALSO?</div>
        <p id="texto-pregunta">Cargando...</p>
        
        <button id="btn-revelar" class="btn-revelar" onclick="revelar()">
            🔍 REVELAR RESPUESTA
        </button>
        
        <div id="respuesta"></div>
        
        <button id="btn-siguiente" class="btn-siguiente" onclick="siguiente()">
            SIGUIENTE PREGUNTA ➔
        </button>
    </div>

<script>
    const bancoTodoUnPoco = [
        { q: "El sonido viaja más rápido en el agua que en el aire", a: "¡VERDADERO! El agua es más densa.", tipo: "verdadero" },
        { q: "Las jirafas tienen cuerdas vocales", a: "FALSO. Son prácticamente mudas.", tipo: "falso" },
        { q: "Chile es el país más largo del mundo", a: "VERDADERO. (De norte a sur).", tipo: "verdadero" },
        { q: "Un rayo es más caliente que la superficie del sol", a: "VERDADERO. Hasta 5 veces más.", tipo: "verdadero" },
        { q: "Los humanos comparten el 50% de su ADN con un plátano", a: "¡VERDADERO! Es pura biología.", tipo: "verdadero" },
        { q: "Las hormigas nunca duermen", a: "VERDADERO. Toman pequeñas siestas de segundos.", tipo: "verdadero" },
        { q: "Los elefantes son los únicos animales que no pueden saltar", a: "VERDADERO. Pesan demasiado.", tipo: "verdadero" },
        { q: "El corazón de una ballena azul es del tamaño de un auto", a: "VERDADERO. ¡Es enorme!", tipo: "verdadero" },
        { q: "La miel nunca se echa a perder", a: "VERDADERO. Han hallado miel de 3000 años comestible.", tipo: "verdadero" },
        { q: "El pulpo tiene tres corazones", a: "VERDADERO. Dos para las branquias y uno para el cuerpo.", tipo: "verdadero" },
        { q: "Los pingüinos tienen rodillas", a: "VERDADERO. Están ocultas bajo sus plumas.", tipo: "verdadero" },
        { q: "El teclado QWERTY fue diseñado para escribir más rápido", a: "FALSO. Fue para no trabar las máquinas viejas.", tipo: "falso" },
        { q: "Venus es el planeta más caliente del sistema solar", a: "VERDADERO. Por su atmósfera espesa.", tipo: "verdadero" },
        { q: "Los conejos son roedores", a: "FALSO. Son lagomorfos.", tipo: "falso" },
        { q: "El encendedor se inventó antes que los fósforos", a: "VERDADERO. El encendedor se inventó en 1823 y los fósforos en 1826.", tipo: "verdadero" },
        { q: "Un año en Mercurio dura solo 88 días", a: "VERDADERO. Gira muy rápido al sol.", tipo: "verdadero" },
        { q: "Los perros solo ven en blanco y negro", a: "FALSO. Ven colores, pero menos que nosotros.", tipo: "falso" },
        { q: "Los gatos tienen 32 músculos en cada oreja", a: "VERDADERO. Las mueven como radares.", tipo: "verdadero" },
        { q: "La Torre Eiffel crece en verano", a: "VERDADERO. Por la expansión del metal.", tipo: "verdadero" },
        { q: "Mónaco es más pequeño que el Central Park de NY", a: "VERDADERO. Es un país diminuto.", tipo: "verdadero" },
        { q: "El nombre de Google viene de un número matemático", a: "VERDADERO. Viene de 'Googol'.", tipo: "verdadero" },
        { q: "Australia es más ancha que la Luna", a: "VERDADERO. Por unos 600 kilómetros.", tipo: "verdadero" },
        { q: "El Sol representa el 99% de la masa del sistema solar", a: "VERDADERO. Es casi todo el sistema.", tipo: "verdadero" },
        { q: "El desierto del Sahara es el más grande del mundo", a: "FALSO. Es la Antártida.", tipo: "falso" },
        { q: "Los caballitos de mar macho dan a luz", a: "VERDADERO. Llevan los huevos en su bolsa.", tipo: "verdadero" },
        { q: "Las huellas dactilares de los koalas son como las humanas", a: "VERDADERO. Son casi imposibles de distinguir.", tipo: "verdadero" },
        { q: "La Coca-Cola originalmente era verde", a: "FALSO. Siempre fue de color oscuro.", tipo: "falso" },
        { q: "Se puede escuchar el silencio en el espacio", a: "VERDADERO. No hay aire para mover el sonido.", tipo: "verdadero" },
        { q: "Napoleón era extremadamente bajito", a: "FALSO. Medía 1.68m, era mala publicidad de sus enemigos.", tipo: "falso" }
    ];

    const bancoCuriosidadesHistoria = [
        { q: "Napoleón era extremadamente bajito", a: "FALSO. Medía 1.68m, promedio para su época.", tipo: "falso" },
        { q: "El chocolate era usado como moneda por los aztecas", a: "VERDADERO. El cacao valía oro.", tipo: "verdadero" },
        { q: "La Gran Muralla China es visible desde la Luna", a: "FALSO. Es un mito muy común.", tipo: "falso" },
        { q: "El encendedor se inventó antes que los fósforos", a: "VERDADERO. El encendedor se inventó en 1823 y los fósforos en 1826.", tipo: "verdadero" },
        { q: "Los romanos usaban orina para lavar la ropa", a: "VERDADERO. La usaban como detergente por su amoníaco.", tipo: "verdadero" },
        { q: "La primera computadora electrónica se creó durante la Segunda Guerra Mundial", a: "VERDADERO. Fue un invento militar temprano.", tipo: "verdadero" },
        { q: "La imprenta fue inventada antes del año 1000", a: "FALSO. Gutenberg la popularizó en 1440.", tipo: "falso" },
        { q: "El calendario gregoriano reemplazó al juliano en 1582", a: "VERDADERO. Para corregir el desfase solar.", tipo: "verdadero" },
        { q: "Cristóbal Colón descubrió que la Tierra era redonda", a: "FALSO. Ya se sabía mucho antes de su viaje.", tipo: "falso" },
        { q: "Los vikingos usaban cascos con cuernos en batalla", a: "FALSO. Eso es un mito moderno.", tipo: "falso" },
        { q: "La Gran Pirámide de Guiza fue construida por esclavos", a: "FALSO. Era obra de trabajadores especializados.", tipo: "falso" },
        { q: "El primer papel moneda apareció en China", a: "VERDADERO. Fue en la dinastía Song.", tipo: "verdadero" },
        { q: "La Asamblea Nacional de Francia se reunió por primera vez en 1789", a: "VERDADERO. Fue el inicio de la Revolución Francesa.", tipo: "verdadero" },
        { q: "El algodón de azúcar fue inventado por un dentista", a: "VERDADERO. Ironías de la historia.", tipo: "verdadero" },
        { q: "El teclado QWERTY fue diseñado para escribir más rápido", a: "FALSO. Fue para no trabar las máquinas viejas.", tipo: "falso" }
    ];

    let mazo = [];
    let actual = 0;
    let num = 1;

    function seleccionarCategoria(categoria) {
        const pantallaInicial = document.getElementById('pantalla-inicial');
        pantallaInicial.style.display = 'none';
        document.getElementById('contador').classList.remove('hidden');
        document.getElementById('preguntas-card').classList.remove('hidden');

        const tipoLabel = document.getElementById('categoria-tipo');
        if (categoria === 'historia') {
            mazo = [...bancoCuriosidadesHistoria];
            tipoLabel.innerText = 'CURIOSIDADES DE LA HISTORIA';
        } else {
            mazo = [...bancoTodoUnPoco];
            tipoLabel.innerText = 'DE TODO UN POCO';
        }

        num = 1;
        sacarPregunta();
    }

    function sacarPregunta() {
        if (mazo.length === 0) {
            document.getElementById('texto-pregunta').innerHTML = "¡Felicidades!<br>Eres el más Vacán 🔥🐮";
            document.getElementById('btn-revelar').style.display = 'none';
            document.getElementById('contador').innerText = "¡VICTORIA!";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            return;
        }
        actual = Math.floor(Math.random() * mazo.length);
        document.getElementById('texto-pregunta').innerText = mazo[actual].q;
        document.getElementById('contador').innerText = "PREGUNTA #" + num;
        document.getElementById('respuesta').style.display = 'none';
        document.getElementById('respuesta').className = '';
        document.getElementById('btn-siguiente').style.display = 'none';
        document.getElementById('btn-revelar').style.display = 'flex';
    }

    function revelar() {
        const respDiv = document.getElementById('respuesta');
        respDiv.innerText = mazo[actual].a;
        respDiv.className = mazo[actual].tipo;
        respDiv.style.display = 'block';
        document.getElementById('btn-revelar').style.display = 'none';
        document.getElementById('btn-siguiente').style.display = 'block';
    }

    function siguiente() {
        mazo.splice(actual, 1); 
        num++;
        sacarPregunta();
    }
</script>

</body>
</html>
